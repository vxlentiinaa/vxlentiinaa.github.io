<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Valentina Ruz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- FONDO MATRIX -->
  <div class="matrix-bg"></div>
  <div class="scanner"></div>

  <!-- UI ESQUINAS -->
  <div class="ui-corners">
    <div class="corner top-left">
      <a href="index.html" class="logo-box">vxle</a>
    </div>
  </div>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-grid">

      <div class="hero-content">
        <p class="small">Portafolio 2026</p>
        <h1>VXLENTIINAA</h1>
        <p class="subtitle">Diseñadora Industrial y de sistemas interactivos</p>

        <p class="description">
          Diseño experiencias, objetos y sistemas, donde lo físico y lo digital se cruzan.
        </p>

        <a href="projects/and-y.html" class="btn">Ver proyectos →</a>
      </div>

    </div>
  </header>

  <!-- ABOUT -->
  <section class="about-section">
    <div class="neon-line"></div>
    <a href="about.html" class="about-big">ABOUT</a>
  </section>

  <!-- ANIMACIÓN ABOUT -->
  <script>
    const aboutSection = document.querySelector('.about-section');

    window.addEventListener('scroll', () => {
      const trigger = window.innerHeight * 0.8;
      const top = aboutSection.getBoundingClientRect().top;

      if (top < trigger) {
        aboutSection.classList.add('visible');
      }
    });
  </script>

  <!-- MATRIX JS -->
 <script src="script.js"></script>

</body>
</html>
